<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0b0e1f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>OPS Nativo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0b0e1f;--navy2:#111428;--navy3:#161a34;
  --gold:#c9a84c;--gold2:#e2c06a;
  --teal:#4ecdc4;
  --border:rgba(201,168,76,.15);
}
html,body{min-height:100vh;background:var(--navy);color:#fff;font-family:'Outfit',sans-serif;overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 100% 55% at 50% -5%,rgba(201,168,76,.13) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 100% 80%,rgba(29,33,66,.5) 0%,transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(201,168,76,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.035) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 0%,transparent 100%);
}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:40px;}

/* Top gold bar */
.top-bar{width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}

/* Header */
.header{padding:36px 24px 24px;display:flex;flex-direction:column;align-items:center;}
.icono{width:84px;height:84px;margin-bottom:16px;}
.icono img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 18px rgba(201,168,76,.45));}
.grupo-logo img{width:220px;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(201,168,76,.25));}
.header-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;}
.header-sub{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);}

/* FIFA badge */
.fifa{
  width:calc(100% - 40px);max-width:440px;
  margin-bottom:28px;padding:13px 18px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(201,168,76,.09),rgba(201,168,76,.03));
  border:1px solid rgba(201,168,76,.22);
  display:flex;align-items:center;gap:12px;
}
.fifa-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;box-shadow:0 0 8px rgba(76,175,80,.7);animation:pulse 2s ease infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.fifa-txt{flex:1;}
.fifa-t{font-size:.7rem;font-weight:600;color:var(--gold2);letter-spacing:.05em;}
.fifa-s{font-size:.6rem;color:rgba(255,255,255,.4);margin-top:1px;}

/* Section label */
.sec-lbl{
  width:calc(100% - 40px);max-width:440px;
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.sec-line{flex:1;height:1px;background:var(--border);}
.sec-txt{font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.45);}

/* Venue cards - LOGO ONLY */
.venues{width:calc(100% - 40px);max-width:440px;display:flex;flex-direction:column;gap:12px;}

.vcard{
  display:block;text-decoration:none;
  border-radius:20px;overflow:hidden;position:relative;
  border:1px solid var(--border);
  background:var(--navy2);
  cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease;
  -webkit-user-select:none;user-select:none;
}
.vcard.active:hover{box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.3);transform:translateY(-2px);}
.vcard.active:active{transform:scale(.97);box-shadow:none;}
.vcard.soon{opacity:.45;cursor:default;}
.vcard.soon:active{transform:none;}

/* Accent top line */
.vcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:2;background:var(--acc);}

/* Logo container - centered, generous padding */
.vcard-inner{
  padding:28px 24px;
  display:flex;align-items:center;justify-content:center;
  min-height:120px;position:relative;z-index:1;
}
.vcard-inner img{max-height:90px;max-width:100%;object-fit:contain;}

/* Status indicator bottom-right */
.vcard-status{
  position:absolute;bottom:12px;right:16px;z-index:2;
  display:flex;align-items:center;gap:5px;
  font-size:.55rem;letter-spacing:.08em;color:rgba(255,255,255,.35);
}
.sdot{width:5px;height:5px;border-radius:50%;background:#4caf50;animation:pulse 2s ease infinite;}

/* Peninsular */
.pen::before{--acc:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);}
.pen{background:linear-gradient(135deg,#111428,#151830);}

/* Chetumalito */
.chet::before{--acc:linear-gradient(90deg,transparent,#4ecdc4,#00b4d8,#4ecdc4,transparent);}
.chet{background:linear-gradient(135deg,#0e1820,#111e28);}
.chet-text{
  font-family:'Cormorant Garamond',serif;
  font-size:2.8rem;font-weight:700;
  color:#4ecdc4;letter-spacing:.05em;
  text-shadow:0 0 30px rgba(78,205,196,.3);
  line-height:1;
}
.chet-sub{font-size:.68rem;color:rgba(78,205,196,.55);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}

/* Ánimas */
.ani::before{--acc:linear-gradient(90deg,transparent,rgba(167,139,250,.4),rgba(167,139,250,.4),transparent);}
.ani-text{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:rgba(167,139,250,.4);letter-spacing:.08em;}
.soon-chip{font-size:.56rem;color:rgba(255,255,255,.25);letter-spacing:.1em;margin-top:4px;}

/* Footer */
.footer{margin-top:32px;text-align:center;}
.footer-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.25),transparent);margin:0 auto 8px;}
.footer-txt{font-size:.55rem;color:rgba(255,255,255,.15);letter-spacing:.12em;text-transform:uppercase;}

/* Ripple */
@keyframes ripple{to{transform:scale(5);opacity:0;}}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.09);width:40px;height:40px;margin:-20px 0 0 -20px;animation:ripple .55s linear;pointer-events:none;z-index:10;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.header{animation:fadeUp .55s ease both;}
.fifa{animation:fadeUp .55s .08s ease both;}
.sec-lbl{animation:fadeUp .55s .14s ease both;}
.venues{animation:fadeUp .55s .18s ease both;}
</style>
</head>
